name: Debug - Secret Injection Test

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment name to test (leave blank for repo-level secrets)"
        required: false
        type: string

jobs:
  test-secrets:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      secrets: read
    steps:
      - name: List repo secrets via gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Secrets visible to this job (names only, no values):"
          gh secret list --repo kennydoit/fin-trade-extract-nosubs || echo "403: token lacks secret-list permission (expected)"

      - name: Check secret injection
        env:
          TEST_SECRET: ${{ secrets.TEST_SECRET }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          echo "--- Secret injection diagnostics ---"

          TEST_LEN=${#TEST_SECRET}
          FRED_LEN=${#FRED_API_KEY}

          echo "TEST_SECRET present: $( [ "$TEST_LEN" -gt 0 ] && echo YES || echo NO ) (length: $TEST_LEN)"
          echo "FRED_API_KEY present: $( [ "$FRED_LEN" -gt 0 ] && echo YES || echo NO ) (length: $FRED_LEN)"

          if [ "$TEST_LEN" -gt 0 ]; then
            echo "::add-mask::$TEST_SECRET"
            echo "TEST_SECRET sha256_12: $(printf '%s' "$TEST_SECRET" | sha256sum | cut -c1-12)"
          fi

          if [ "$FRED_LEN" -gt 0 ]; then
            echo "::add-mask::$FRED_API_KEY"
            echo "FRED_API_KEY sha256_12: $(printf '%s' "$FRED_API_KEY" | sha256sum | cut -c1-12)"
            if [[ "$FRED_API_KEY" =~ ^[a-z0-9]{32}$ ]]; then
              echo "FRED_API_KEY format: VALID"
            else
              echo "FRED_API_KEY format: INVALID - not 32 lower-case alpha-numeric chars"
            fi
          fi

          echo "--- Runner context ---"
          echo "github.event_name: $GITHUB_EVENT_NAME"
          echo "github.actor:       $GITHUB_ACTOR"
          echo "github.repository:  $GITHUB_REPOSITORY"
          echo "github.ref:         $GITHUB_REF"

          if [ "$TEST_LEN" -eq 0 ] && [ "$FRED_LEN" -eq 0 ]; then
            echo ""
            echo "ERROR: No secrets reached this job."
            echo "Likely causes:"
            echo "1. Secrets were added to a named Environment (e.g. 'production') - add 'environment: <name>' to the job"
            echo "2. Repo/org-level policy is blocking Actions secret access"
            echo "3. Secrets were saved with the wrong name - check Settings > Secrets and variables > Actions"
            exit 1
          fi
