name: SEC Filings EDA

on:
  workflow_dispatch:

jobs:
  sec-eda:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Snowflake private key
        working-directory: ${{ github.workspace }}
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY_B64 }}" | base64 --decode > snowflake_rsa_key.der

      - name: Run SEC Filings EDA
        working-directory: ${{ github.workspace }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_PRIVATE_KEY_PATH: snowflake_rsa_key.der
        run: |
          python scripts/eda/sec_explore.py

      - name: Upload EDA spreadsheet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sec-filings-eda-${{ github.run_number }}
          path: eda/data/sec_filings_eda.xlsx
          if-no-files-found: warn
          retention-days: 30
