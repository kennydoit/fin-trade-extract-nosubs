name: FRED ETL - No Watermark (Temporary)

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fred_watermark_etl.yml'
      - 'scripts/**'
      - 'snowflake/**'
      - 'config/**'
  workflow_dispatch:
    inputs:
      category_filter:
        description: "Optional category filter from config/fred_series.yml"
        required: false
        type: string
      max_series:
        description: "Optional max number of series to process"
        required: false
        type: number
  schedule:
    # Daily at 23:00 UTC
    - cron: "0 23 * * *"

jobs:
  fred-etl-no-watermark:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      id-token: write
      contents: read
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pyyaml fredapi pandas snowflake-connector-python cryptography

      - name: Fetch FRED data (no watermark mode)
        working-directory: ${{ github.workspace }}
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FRED_API_KEY_VAR: ${{ vars.FRED_API_KEY }}
          FRED_DISABLE_WATERMARK: "true"
          FRED_UPLOAD_TARGET: local
          FRED_LOCAL_OUTPUT_DIR: /tmp/fred_data
          FRED_CONFIG_PATH: config/fred_series.yml
          FRED_DEFAULT_START_DATE: "1950-01-01"
          CATEGORY_FILTER: ${{ inputs.category_filter }}
          MAX_SERIES: ${{ inputs.max_series }}
        run: |
          echo "Starting no-watermark FRED ETL"
          if [ -z "$FRED_API_KEY" ] && [ -n "$FRED_API_KEY_VAR" ]; then
            echo "Using FRED_API_KEY from repository variable fallback (vars.FRED_API_KEY)."
            FRED_API_KEY="$FRED_API_KEY_VAR"
          fi

          KEY_LEN=${#FRED_API_KEY}
          if ! [[ "$FRED_API_KEY" =~ ^[a-z0-9]{32}$ ]]; then
            echo "Invalid FRED_API_KEY format (length: $KEY_LEN)."
            if [ "$KEY_LEN" -eq 0 ]; then
              echo "No key value reached the job. Check these in order:"
              echo "1) Repo/Org secret named exactly FRED_API_KEY exists"
              echo "2) If using Environment secrets, set the job environment so those secrets are in scope"
              echo "3) Run source is not a fork context where secrets are blocked"
              echo "4) Optional fallback: set repository variable vars.FRED_API_KEY"
            else
              echo "Expected 32 lower-case alpha-numeric characters; check FRED_API_KEY for quotes, spaces, or newlines."
            fi
            exit 1
          fi
          if [ -n "$CATEGORY_FILTER" ]; then
            echo "Category filter: $CATEGORY_FILTER"
          fi
          if [ -n "$MAX_SERIES" ]; then
            echo "Max series: $MAX_SERIES"
          fi
          python scripts/etl/fetch_fred_watermark.py

      - name: Upload processing results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fred-etl-no-watermark-results-${{ github.run_number }}
          path: |
            /tmp/fred_watermark_results.json
            /tmp/fred_data
          if-no-files-found: warn
          retention-days: 30
