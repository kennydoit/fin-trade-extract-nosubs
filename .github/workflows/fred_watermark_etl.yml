name: FRED ETL - No Watermark (Temporary)

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fred_watermark_etl.yml'
      - 'scripts/**'
      - 'snowflake/**'
      - 'config/**'
  workflow_dispatch:
    inputs:
      category_filter:
        description: "Optional category filter from config/fred_series.yml"
        required: false
        type: string
      max_series:
        description: "Optional max number of series to process"
        required: false
        type: number
  schedule:
    # Daily at 23:00 UTC
    - cron: "0 23 * * *"

jobs:
  fred-etl-no-watermark:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      PYTHONUNBUFFERED: "1"
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pyyaml fredapi pandas snowflake-connector-python cryptography

      - name: Verify AWS credentials
        run: |
          echo "AWS_ACCESS_KEY_ID first 4 chars: ${AWS_ACCESS_KEY_ID:0:4}"
          echo "AWS_ACCESS_KEY_ID length: ${#AWS_ACCESS_KEY_ID}"
          echo "AWS_SECRET_ACCESS_KEY length: ${#AWS_SECRET_ACCESS_KEY}"

      - name: Clear S3 bucket prefix before run
        run: |
          echo "Clearing s3://fin-trade-extract-nosubs-bucket/fred/"
          aws s3 rm s3://fin-trade-extract-nosubs-bucket/fred/ --recursive
          echo "S3 prefix cleared."

      - name: Fetch FRED data and upload to S3
        working-directory: ${{ github.workspace }}
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FRED_DISABLE_WATERMARK: "true"
          FRED_UPLOAD_TARGET: s3
          S3_BUCKET: fin-trade-extract-nosubs-bucket
          S3_FRED_PREFIX: fred/
          FRED_CONFIG_PATH: config/fred_series.yml
          FRED_DEFAULT_START_DATE: "1950-01-01"
          CATEGORY_FILTER: ${{ inputs.category_filter }}
          MAX_SERIES: ${{ inputs.max_series }}
        run: |
          echo "::add-mask::$FRED_API_KEY"
          if ! [[ "$FRED_API_KEY" =~ ^[a-z0-9]{32}$ ]]; then
            echo "ERROR: FRED_API_KEY is missing or invalid (length: ${#FRED_API_KEY})."
            exit 1
          fi
          echo "Starting no-watermark FRED ETL"
          if [ -n "$CATEGORY_FILTER" ]; then
            echo "Category filter: $CATEGORY_FILTER"
          fi
          if [ -n "$MAX_SERIES" ]; then
            echo "Max series: $MAX_SERIES"
          fi
          python scripts/etl/fetch_fred_watermark.py

      - name: Set up Snowflake private key
        working-directory: ${{ github.workspace }}
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY_B64 }}" | base64 --decode > snowflake_rsa_key.der

      - name: Create table and load FRED data from S3
        working-directory: ${{ github.workspace }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          S3_URI: s3://fin-trade-extract-nosubs-bucket/fred/
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          python scripts/github_actions/snowflake_run_sql_file.py snowflake/runbooks/load_fred_from_s3.sql

      - name: Merge FRED raw to curated
        working-directory: ${{ github.workspace }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        run: |
          python scripts/github_actions/snowflake_run_sql_file.py snowflake/runbooks/merge_fred_raw_to_curated.sql

      - name: Suspend Snowflake warehouse
        if: always()
        working-directory: ${{ github.workspace }}
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_SCHEMA: ${{ secrets.SNOWFLAKE_SCHEMA }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        run: |
          python scripts/github_actions/snowflake_run_sql_file.py snowflake/runbooks/suspend_warehouse.sql

      - name: Upload processing results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fred-etl-no-watermark-results-${{ github.run_number }}
          path: |
            /tmp/fred_watermark_results.json
            /tmp/fred_data
          if-no-files-found: warn
          retention-days: 30
